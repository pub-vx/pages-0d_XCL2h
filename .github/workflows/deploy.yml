name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare output (flat prebuilt — copy everything, drop noise)
        run: |
          mkdir -p output
          cp -r * output/ 2>/dev/null || true
          # drop source-only files that don't belong on Pages
          find output -maxdepth 2 -name '*.tsx' -delete
          find output -maxdepth 2 -name '*.ts' ! -name '*.d.ts' -delete
          find output -maxdepth 2 -name 'package*.json' -delete
          find output -maxdepth 2 -name 'tsconfig*.json' -delete
          find output -maxdepth 2 -name 'vite.config.*' -delete
          find output -maxdepth 2 -name 'eslint.config.*' -delete
          rm -rf output/node_modules output/.github

      - name: Rewrite absolute /assets/ refs to root (no assets subdir on this bundle)
        run: |
          find output -maxdepth 2 -name '*.html' -exec sed -i \
            -e 's|"/assets/|"./|g' \
            -e "s|'/assets/|'./|g" {} +
          # vite __vitePreload helper: function(x){return"/"+x}
          # the chunk arg x is the chunk filename (no path prefix when files are flat).
          find output -name '*.js' -exec sed -i -E \
            's|function\(([a-z_$])\)\{return"/"\+\1\}|function(\1){return"./"+\1}|g' {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
